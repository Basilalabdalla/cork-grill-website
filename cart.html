                        <section id="checkoutFormSection" class="checkout-form" style="display:none;" aria-labelledby="checkout-heading">
                            <h2 id="checkout-heading">Checkout Details</h2>
                            <form id="checkoutForm" novalidate>
                                <fieldset>
                                    <legend>Your Information</legend>
                                    <div class="form-group">
                                        <label for="checkoutName">Full Name:</label>
                                        <input type="text" id="checkoutName" name="checkoutName" required autocomplete="name">
                                        <span class="error-message" aria-live="polite"></span>
                                    </div>
                                    <div class="form-group">
                                        <label for="checkoutEmail">Email:</label>
                                        <input type="email" id="checkoutEmail" name="checkoutEmail" required autocomplete="email">
                                        <span class="error-message" aria-live="polite"></span>
                                    </div>
                                    <div class="form-group">
                                        <label for="checkoutPhone">Phone Number:</label>
                                        <input type="tel" id="checkoutPhone" name="checkoutPhone" required pattern="[0-9\s\-()+]{7,}" autocomplete="tel">
                                        <span class="error-message" aria-live="polite"></span>
                                    </div>
                                </fieldset>
                
                                <fieldset>
                                    <legend>Order Type</legend>
                                    <div class="form-group form-group-radio">
                                        {/* Ensure these have unique IDs if you want to save/load their state, though name attribute handles selection */}
                                        <label><input type="radio" id="orderTypePickup" name="orderType" value="pickup" checked> Pickup</label>
                                        <label><input type="radio" id="orderTypeDelivery" name="orderType" value="delivery"> Delivery</label>
                                    </div>
                                </fieldset>
                
                                <fieldset id="deliveryAddressFields" class="delivery-fields" style="display:none;">
                                    <legend>Delivery Address</legend>
                                    <div class="form-group">
                                        <label for="checkoutAddress1">Address Line 1:</label>
                                        <input type="text" id="checkoutAddress1" name="checkoutAddress1" autocomplete="street-address">
                                        <span class="error-message" aria-live="polite"></span>
                                    </div>
                                    <div class="form-group">
                                        <label for="checkoutAddress2">Address Line 2 (Optional):</label>
                                        <input type="text" id="checkoutAddress2" name="checkoutAddress2" autocomplete="address-line2">
                                        <span class="error-message" aria-live="polite"></span>
                                    </div>
                                    <div class="form-group">
                                        <label for="checkoutEircode">Eircode:</label>
                                        <input type="text" id="checkoutEircode" name="checkoutEircode" autocomplete="postal-code">
                                        <span class="error-message" aria-live="polite"></span>
                                    </div>
                                    <div class="form-group">
                                        <label for="deliveryInstructions">Delivery Instructions (Optional):</label>
                                        <textarea id="deliveryInstructions" name="deliveryInstructions" rows="3"></textarea>
                                        <span class="error-message" aria-live="polite"></span>
                                    </div>
                                </fieldset>
                
                                <fieldset>
                                    <legend>Payment</legend>
                                    <p class="payment-placeholder">Payment processing will be handled securely. (Online payment options coming soon!)</p>
                                    <div class="form-group">
                                         <label><input type="radio" id="paymentCash" name="paymentMethod" value="cash_on_pickup" checked> Pay on Pickup/Delivery (Cash/Card)</label>
                                    </div>
                                </fieldset>
                
                                <button type="submit" class="btn btn-primary btn-place-order" id="placeOrderBtn">
                                    <span class="btn-text">Place My Order</span>
                                    <span class="loading-spinner" style="display: none;"></span>
                                </button>
                            </form>
                        </section>
